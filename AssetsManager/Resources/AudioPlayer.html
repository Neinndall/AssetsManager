<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        :root {
            --bg-dark: #0F111A;
            --card-bg: #1E2233;
            --accent: #00D1FF;
            --accent-muted: rgba(0, 209, 255, 0.2);
            --text-primary: #E0E0E6;
            --text-secondary: #9499B3;
            --border: #2D314D;
        }

        body { 
            background-color: transparent !important; 
            margin: 0; padding: 20px; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
            color: var(--text-primary);
        }

        #player-container {
            width: 100%; max-width: 580px;
            background: var(--card-bg);
            padding: 24px; 
            border-radius: 11px; 
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            position: relative;
        }

        /* Header Info */
        .header { 
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 20px; border-left: 3px solid var(--accent); padding-left: 14px;
        }
        .file-info { flex: 1; min-width: 0; }
        .file-name { 
            font-size: 15px; font-weight: 700; color: #ffffff; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            margin-bottom: 1px;
        }
        .file-meta { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }

        /* Waveform */
        #waveform { 
            width: 100%; height: 80px; cursor: pointer; 
            background: rgba(0,0,0,0.1); border-radius: 4px;
            margin-bottom: 16px;
        }

        /* Compact Control Bar */
        .control-bar {
            display: flex; align-items: center; justify-content: space-between;
            gap: 16px; margin-top: 4px;
        }

        .left-controls { display: flex; align-items: center; gap: 14px; flex: 1; }
        .right-controls { display: flex; align-items: center; gap: 16px; }

        /* Buttons */
        .play-btn {
            width: 42px; height: 42px; border-radius: 50%; 
            background: var(--accent); border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(0, 209, 255, 0.2);
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 6px 16px rgba(0, 209, 255, 0.3); }
        .play-btn svg { fill: var(--bg-dark); width: 22px; height: 22px; }

        /* Time Display */
        .time-display {
            font-family: 'Consolas', 'Cascadia Code', monospace;
            font-size: 12px; color: var(--text-primary);
            min-width: 85px;
        }
        .time-total { color: var(--text-secondary); }

        /* Volume Slider */
        .volume-container { display: flex; align-items: center; gap: 10px; width: 110px; }
        .volume-container svg { width: 16px; height: 16px; fill: var(--text-secondary); }
        
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 3px; cursor: pointer;
            background: var(--border); border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 12px; width: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
            -webkit-appearance: none; margin-top: -4.5px;
            box-shadow: 0 0 8px rgba(0, 209, 255, 0.4);
        }

        /* Speed Selector */
        .speed-control {
            display: flex; align-items: center; gap: 6px;
        }
        .speed-badge {
            padding: 3px 8px; border-radius: 4px; background: var(--border);
            cursor: pointer; border: 1px solid transparent;
            font-size: 10px; font-weight: 700; color: var(--text-secondary);
            transition: all 0.2s;
        }
        .speed-badge:hover { color: var(--text-primary); background: #353a5a; }
        .speed-badge.active { background: var(--accent-muted); border-color: var(--accent); color: var(--accent); }

    </style>
</head>
<body>
    <div id="player-container">
        <div class="header">
            <div class="file-info">
                <div class="file-name">{{DISPLAY_NAME}}</div>
                <div class="file-meta">Audio Asset • {{FILE_EXTENSION}}</div>
            </div>
            <div class="speed-control">
                <div class="speed-badge" onclick="setSpeed(0.5)">0.5x</div>
                <div class="speed-badge active" onclick="setSpeed(1.0)">1.0x</div>
                <div class="speed-badge" onclick="setSpeed(1.5)">1.5x</div>
                <div class="speed-badge" onclick="setSpeed(2.0)">2.0x</div>
            </div>
        </div>

        <div id="waveform"></div>
        
        <div class="control-bar">
            <div class="left-controls">
                <button class="play-btn" id="playPause" title="Play/Pause">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="time-display">
                    <span id="current-time">0:00</span>
                    <span class="time-total"> / <span id="total-duration">0:00</span></span>
                </div>
            </div>

            <div class="right-controls">
                <div class="volume-container">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V5L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                    <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
                </div>
            </div>
        </div>
    </div>

    <script>
        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#3D4466',
            progressColor: '#00D1FF',
            cursorColor: '#ffffff',
            cursorWidth: 1,
            barWidth: 3,
            barGap: 3,
            barRadius: 4,
            responsive: true,
            height: 80,
            url: '{{FILE_URL}}',
            interact: true
        });

        const playBtn = document.getElementById('playPause');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const curTime = document.getElementById('current-time');
        const durTime = document.getElementById('total-duration');
        const volumeSlider = document.getElementById('volume');

        const formatTime = (s) => {
            const min = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        };

        playBtn.onclick = () => wavesurfer.playPause();
        
        volumeSlider.oninput = (e) => {
            wavesurfer.setVolume(e.target.value);
        };

        function setSpeed(speed) {
            wavesurfer.setPlaybackRate(speed);
            document.querySelectorAll('.speed-badge').forEach(b => {
                b.classList.remove('active');
                if(parseFloat(b.innerText) === speed) b.classList.add('active');
            });
        }

        wavesurfer.on('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        });
        
        wavesurfer.on('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });

        wavesurfer.on('finish', () => {
            wavesurfer.seekTo(0);
        });

        wavesurfer.on('timeupdate', (t) => {
            curTime.innerText = formatTime(t);
        });

        wavesurfer.on('ready', (d) => {
            durTime.innerText = formatTime(d);
            wavesurfer.setVolume(volumeSlider.value);
            if (window.shouldAutoplay) wavesurfer.play();
        });

        window.playMedia = () => wavesurfer.play();
        window.shouldAutoplay = true;
    </script>
</body>
</html>
